<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision For Final Exam - @truonggcong</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f4f1de;
            color: #1d1d1b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- CSS CHO MODAL NHẬP THÔNG TIN --- */
        #info-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border: 4px solid #1d1d1b;
            box-shadow: 10px 10px 0px #e07a5f;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 { color: #e07a5f; text-transform: uppercase; }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 3px solid #1d1d1b;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
        }

        /* --- CSS CHO ĐỒNG HỒ ĐẾM GIỜ --- */
        #timer-box {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #f2cc8f;
            border: 3px solid #1d1d1b;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 4px 4px 0px #1d1d1b;
            z-index: 100;
        }

        .container {
            background-color: #fff;
            max-width: 700px;
            width: 90%;
            border: 4px solid #1d1d1b;
            box-shadow: 10px 10px 0px #e07a5f;
            border-radius: 12px;
            padding: 30px;
            display: none; /* Ẩn khi chưa nhập thông tin */
        }

        .header { text-align: center; border-bottom: 3px dashed #1d1d1b; padding-bottom: 20px; margin-bottom: 20px; }
        .header h1 { color: #e07a5f; margin: 0; }

        .question-box { background: #f2cc8f; padding: 20px; border: 3px solid #1d1d1b; border-radius: 8px; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        
        input[type="text"] { width: 100%; padding: 12px; border: 3px solid #1d1d1b; border-radius: 8px; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; }

        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background: #3d405b; color: #fff; border: 3px solid #1d1d1b; border-radius: 8px; cursor: pointer; box-shadow: 4px 4px 0px #1d1d1b; }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #1d1d1b; }

        .feedback { display: none; padding: 15px; border: 3px solid #1d1d1b; border-radius: 8px; margin-top: 15px; font-weight: 600; }
        .correct { background: #81b29a; color: white; }
        .incorrect { background: #e07a5f; color: white; }
    </style>
</head>
<body>

    <div id="timer-box">Time: 00:00</div>

    <div id="info-modal">
        <div class="modal-content">
            <h2>Welcome! 👋</h2>
            <p>Nhập thông tin để bắt đầu làm bài nhé!</p>
            <input type="text" id="student-name" placeholder="Họ và Tên học sinh">
            <input type="text" id="student-class" placeholder="Lớp (Ví dụ: 11A8)">
            <button onclick="startQuiz()">BẮT ĐẦU LÀM BÀI</button>
        </div>
    </div>

    <iframe id="music-player" width="0" height="0" src="https://www.youtube.com/embed/Sshf4f66t00?enablejsapi=1" frameborder="0" allow="autoplay"></iframe>

    <div class="container" id="main-container">
        <div class="header">
            <h1>REVISION FOR FINAL EXAM</h1>
            <p id="display-info" style="font-weight: bold; color: #3d405b;"></p>
        </div>

        <div id="quiz-area">
            <div class="progress" id="progress-text">Câu 1 / 25</div>
            <div class="question-box" id="question-text">Loading...</div>
            <input type="text" id="user-answer" placeholder="Nhập đáp án của em...">
            <button id="check-btn" onclick="checkAnswer()">KIỂM TRA</button>
            
            <div class="feedback" id="feedback-box"></div>
            <button id="next-btn" style="display: none; margin-top: 15px; background: #81b29a;" onclick="loadNext()">CÂU TIẾP THEO 🚀</button>
        </div>

        <div id="finish-area" style="display: none; text-align: center;">
            <h2 style="color: #81b29a;">🎉 HOÀN THÀNH! 🎉</h2>
            <p>Dữ liệu của em đã được gửi về cho @truonggcong.</p>
            <p id="total-time-display"></p>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyAE6CV-mQgpMWdyoR06mzAZQ1RyBh5eMBR5eTvir-suR5Ci53Y4IaiIBRasSW4kp02/exec'; // <--- BÀ DÁN LINK GOOGLE APPS SCRIPT VÔ ĐÂY
    
    let studentData = { name: "", className: "", startTime: "", endTime: "" };
    let startTimeObj, timerInterval;
    let currentIdx = 0;

    const questions = [
        { q: "1. Mary (establish) ____________ a successful tech startup by the time she turns 30.", a: "will have established" },
        { q: "2. The orchestra (rehearse) ____________ the symphony when the power went out.", a: "was rehearsing" }
        // ... (Bà tự thêm 23 câu còn lại vào đây y chang định dạng này nha)
    ];

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        const cls = document.getElementById('student-class').value;

        if(!name || !cls) { alert("Nhập đủ tên với lớp đi bé ơi!"); return; }

        studentData.name = name;
        studentData.className = cls;
        studentData.startTime = new Date().toLocaleString('vi-VN');
        startTimeObj = new Date();

        document.getElementById('info-modal').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        document.getElementById('display-info').innerText = `${name} - ${cls}`;

        // Chạy nhạc
        const player = document.getElementById('music-player');
        player.src += "&autoplay=1";

        startTimer();
        loadQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            const now = new Date();
            const diff = Math.floor((now - startTimeObj) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer-box').innerText = `Time: ${m}:${s}`;
        }, 1000);
    }

    function loadQuestion() {
        document.getElementById('user-answer').value = "";
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'block';
        
        document.getElementById('progress-text').innerText = `Câu ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = questions[currentIdx].q;
    }

    function checkAnswer() {
        const userVal = document.getElementById('user-answer').value.trim().toLowerCase();
        const correctVal = questions[currentIdx].a.toLowerCase();
        const fb = document.getElementById('feedback-box');

        fb.style.display = 'block';
        if(userVal === correctVal) {
            fb.innerText = "✅ CHÍNH XÁC!";
            fb.className = "feedback correct";
        } else {
            fb.innerText = `❌ SAI RỒI! Đáp án đúng: ${questions[currentIdx].a}`;
            fb.className = "feedback incorrect";
        }
        document.getElementById('check-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function loadNext() {
        currentIdx++;
        if(currentIdx < questions.length) {
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        studentData.endTime = new Date().toLocaleString('vi-VN');
        
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('finish-area').style.display = 'block';
        document.getElementById('total-time-display').innerText = `Thời gian làm bài: ${document.getElementById('timer-box').innerText}`;

        // GỬI DỮ LIỆU QUA GOOGLE SHEET
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(studentData)
        }).then(() => console.log("Đã lưu vào Sheet thành công!"));
    }
</script>
</body>
</html>
