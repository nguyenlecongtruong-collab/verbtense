<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision For Final Exam - @truonggcong</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f4f1de;
            color: #1d1d1b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- CSS CHO MODAL NHẬP THÔNG TIN --- */
        #info-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border: 4px solid #1d1d1b;
            box-shadow: 10px 10px 0px #e07a5f;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 { color: #e07a5f; text-transform: uppercase; }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 3px solid #1d1d1b;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* --- CSS CHO ĐỒNG HỒ ĐẾM GIỜ --- */
        #timer-box {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #f2cc8f;
            border: 3px solid #1d1d1b;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 4px 4px 0px #1d1d1b;
            z-index: 100;
            border-radius: 8px;
        }

        /* --- CSS CHO MÁY PHÁT NHẠC --- */
        #music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            border: 3px solid #1d1d1b;
            box-shadow: 4px 4px 0px #1d1d1b;
            border-radius: 8px;
            overflow: hidden;
            z-index: 100;
            display: none; /* Sẽ hiện lên khi bấm Bắt đầu */
            background: #fff;
        }

        .container {
            background-color: #fff;
            max-width: 750px;
            width: 90%;
            border: 4px solid #1d1d1b;
            box-shadow: 10px 10px 0px #e07a5f;
            border-radius: 12px;
            padding: 30px;
            display: none; /* Ẩn khi chưa nhập thông tin */
            margin-top: 50px;
            margin-bottom: 100px;
        }

        .header { text-align: center; border-bottom: 3px dashed #1d1d1b; padding-bottom: 20px; margin-bottom: 20px; }
        .header h1 { color: #e07a5f; margin: 0; }

        .question-box { background: #f2cc8f; padding: 20px; border: 3px solid #1d1d1b; border-radius: 8px; font-size: 20px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        
        input[type="text"] { width: 100%; padding: 15px; border: 3px solid #1d1d1b; border-radius: 8px; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; }

        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background: #3d405b; color: #fff; border: 3px solid #1d1d1b; border-radius: 8px; cursor: pointer; box-shadow: 4px 4px 0px #1d1d1b; transition: all 0.2s; }
        button:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #1d1d1b; }
        button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        .feedback { display: none; padding: 15px; border: 3px solid #1d1d1b; border-radius: 8px; margin-top: 15px; font-weight: 600; font-size: 18px; }
        .correct { background: #81b29a; color: white; }
        .incorrect { background: #e07a5f; color: white; }
    </style>
</head>
<body>

    <div id="timer-box">Time: 00:00</div>

    </div>

    <div id="info-modal">
        <div class="modal-content">
            <h2>Welcome! 👋</h2>
            <p>Nhập thông tin để bắt đầu làm bài nhé!</p>

    <div class="container" id="main-container">

            <input type="text" id="user-answer" placeholder="Nhập đáp án của em..." autocomplete="off">
            <button id="check-btn" onclick="checkAnswer()">KIỂM TRA</button>
            
            <div class="feedback" id="feedback-box"></div>
            <button id="next-btn" style="display: none; margin-top: 15px; background: #81b29a;" onclick="loadNext()">CÂU TIẾP THEO 🚀</button>
        </div>

        <div id="finish-area" style="display: none; text-align: center;">

            <p style="font-size: 20px; font-weight: 600;">Dữ liệu của em đã được gửi về cho @truonggcong.</p>
            <p id="total-time-display" style="font-size: 22px; color: #e07a5f; font-weight: bold;"></p>

        </div>
    </div>

<script>
